<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - BCC</title>
  <meta name="description" content="Get in touch with Bharat Cricket Club By UGNT. Contact us for inquiries, membership, or partnership opportunities.">
  
  <!-- Favicon -->
  <link rel="icon" href="images/gallery/BCC.jpg" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@600;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- External Stylesheet -->
  <link rel="stylesheet" href="styles.css">
  
  <style>
    body { background: #07111f !important; }

    h1, h2 {
      font-family: 'Oswald', sans-serif !important;
      font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      background: linear-gradient(135deg, #9A6010, #D89018, #F5C040, #D89018, #9A6010);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .main-content {
      padding: 5rem 2rem 4rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .contact-form, .form-container, .contact-card {
      background: #0c1e38 !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      border: 1px solid rgba(255,255,255,0.06) !important;
      border-radius: 6px; position: relative; overflow: hidden;
      padding: 2.5rem;
    }
    .contact-form::before, .form-container::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, #9A6010, #D89018, #F5C040, #D89018, #9A6010);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label, .form-label, .form-group label { color: rgba(255,255,255,0.6) !important; font-size: 0.85rem; display: block; margin-bottom: 0.4rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; }

    .form-input, .form-textarea, input[type="text"], input[type="email"], textarea, .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1) !important;
      background: #07111f !important;
      color: white !important;
      font-size: 0.95rem;
      font-family: 'Montserrat', sans-serif;
      box-sizing: border-box;
      transition: border-color 0.2s ease;
    }

    .form-group select {
      background: #07111f !important;
    }

    .form-group select option {
      background: #0c1e38;
    }

    .form-input:focus, .form-textarea:focus, input:focus, textarea:focus, .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: rgba(216,144,24,0.5) !important; outline: none !important;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .form-group textarea {
      min-height: 130px;
      resize: vertical;
    }

    .form-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 1.5rem 0 1.25rem;
    }

    .submit-btn {
      background: linear-gradient(135deg, #9A6010, #D89018, #F5C040, #D89018, #9A6010) !important;
      color: #07111f !important; font-weight: 800 !important;
      font-family: 'Montserrat', sans-serif !important;
      border: none !important; border-radius: 3px !important;
      transition: opacity 0.2s ease !important;
      width: 100%;
      padding: 1rem;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .submit-btn:hover { opacity: 0.85 !important; }

    .contact-info {
      background: #0c1e38;
      padding: 1.5rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.06);
      margin-top: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .contact-info::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, #9A6010, #D89018, #F5C040, #D89018, #9A6010);
    }

    .contact-info h3 {
      color: #D89018 !important;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 1rem;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .social-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.2s, opacity 0.2s;
    }
    .social-links a:nth-child(1) { color: #FF0000; }
    .social-links a:hover { transform: translateY(-2px); opacity: 0.85; }

    @media (max-width: 600px) {
      .contact-form { padding: 1.5rem; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
    }

    .site-footer { background: #07111f !important; border-top: 1px solid rgba(216,144,24,0.15) !important; }
    .site-footer p { color: rgba(255,255,255,0.35) !important; }
  </style>
</head>

      <span></span>
      <span></span>
      <span></span>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="achievements.html">Achievements</a></li>

      <li><a href="support.html">Donations</a></li>
      <li><a href="contact.html" class="active">Contact Us</a></li>
    </ul>
  </div>
</nav>
<script>
  const menuToggle = document.querySelector('.menu-toggle');
  const navMenu = document.querySelector('nav ul');
  const overlay = document.createElement('div');
  overlay.className = 'nav-overlay';
  document.body.appendChild(overlay);
  function openMenu() { menuToggle.classList.add('active'); navMenu.classList.add('active'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
  function closeMenu() { menuToggle.classList.remove('active'); navMenu.classList.remove('active'); overlay.classList.remove('active'); document.body.style.overflow = ''; }
  menuToggle.addEventListener('click', () => { menuToggle.classList.contains('active') ? closeMenu() : openMenu(); });
  document.querySelectorAll('nav ul li a').forEach(link => link.addEventListener('click', closeMenu));
  overlay.addEventListener('click', closeMenu);
</script>

<!-- Main Content -->
<main class="main-content">
  <h1 class="page-title">Contact Us</h1>
  
  <div class="contact-form">
    <form action="https://formsubmit.co/bharatwarriors2024@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="New Contact Form Submission from BharatWarriors.org">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_next" value="https://bharatwarriors.org/thank-you.html">
      
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required placeholder="Enter your full name">
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required placeholder="your.email@example.com">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890">
        </div>
      </div>

      <div class="form-group">
        <label for="subject">Subject *</label>
        <select id="subject" name="subject" required>
          <option value="">Select a subject...</option>
          <option value="General Inquiry">General Inquiry</option>
          <option value="Join the Team">Join the Team</option>
          <option value="Partnership Opportunity">Partnership Opportunity</option>
          <option value="Match Schedule">Match Schedule</option>
          <option value="Support/Donate">Support/Donate</option>
          <option value="Other">Other</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="message">Message *</label>
        <textarea id="message" name="message" required placeholder="Tell us more about your inquiry..."></textarea>
      </div>
      
      <hr class="form-divider">
      <button type="submit" class="submit-btn">Send Message →</button>
    </form>
  </div>
  
  <div class="contact-info">
    <h3>📧 Email Us</h3>
    <p><a href="mailto:bharatwarriors2024@gmail.com" style="color: #D89018; text-decoration: none;">bharatwarriors2024@gmail.com</a></p>
